<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempos | Competencias Preparación</title>
    <script>
        (function(){
            var repoPrefix = location.hostname.includes('github.io') ? '/bcbd-aspirantes' : '';
            var head = document.getElementsByTagName('head')[0];
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            var rel = '';
            if (repoPrefix) {
                link.href = repoPrefix + '/css/styles.css';
            } else {
                var segs = location.pathname.split('/').filter(Boolean);
                var repoName = 'bcbd-aspirantes';
                var repoIndex = segs.lastIndexOf(repoName);
                var depth = 0;
                if (repoIndex !== -1) {
                    depth = segs.length - (repoIndex + 1);
                    if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
                } else {
                    depth = segs.length;
                    if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
                }
                rel = '../'.repeat(depth);
                link.href = rel + 'css/styles.css';
            }
            head.appendChild(link);
        })();
    </script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body>
    <div id="header"></div>
    <main id="main-content">
        <section class="home-hero">
            <div class="hero-inner">
                <h1>Tiempos</h1>
                <p class="lead">Página central de tiempos para Copa OBA y Fire Challenge Santo Domingo.</p>
            </div>
        </section>

        <section class="overview">
            <h2>Acceso a ranking por competencia</h2>
            <div class="cards-grid">
                <a class="card minimal" href="../../competencias-preparacion/copa-oba-2026/ranking/index.html">
                    <h3>Copa OBA 2026</h3>
                    <p>Ver tiempos y resultados de la Copa OBA 2026.</p>
                </a>
                <a class="card minimal" href="../../competencias-preparacion/fire-challenge-sto-dmngo-2026/ranking/index.html">
                    <h3>Fire Challenge 2026</h3>
                    <p>Ver tiempos y resultados del Fire Challenge Santo Domingo 2026.</p>
                </a>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="../../js/layout.js"></script>
</body>

</html>
