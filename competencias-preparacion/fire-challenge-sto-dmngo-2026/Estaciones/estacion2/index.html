<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Estación #2 — Fire Challenge 2026</title>
  <script>
    (function(){
      var repoPrefix = location.hostname.includes('github.io') ? '/bcbd-aspirantes' : '';
      var head = document.getElementsByTagName('head')[0];
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = repoPrefix + '/css/styles.css';
      head.appendChild(link);
      var layout = document.createElement('script'); layout.src = repoPrefix + '/js/layout.js'; layout.defer = true; head.appendChild(layout);
      var fc = document.createElement('script'); fc.src = repoPrefix + '/js/fire-challenge.js'; fc.defer = true; head.appendChild(fc);
    })();
  </script>
</head>
<body>
  <div id="header"></div>
  <main id="main-content" data-station-index="2">
    <section class="home-hero">
      <div class="hero-inner">
        <h1>Estación #2</h1>
        <p class="lead">Contenido de la estación #2 (vacío por ahora).</p>
      </div>
    </section>
    <section class="overview">
      <h2>Pasos (placeholder)</h2>
      <div class="station-steps">
        <article class="step">
          <div class="step-badge">1</div>
          <div class="step-body">

          </div>
        </article>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  
<script>
// Fallback nav for estacion2
(function(){
  function ensureNav(){
    try{
      var main = document.querySelector('[data-station-index]'); if(!main) return; var idx=parseInt(main.getAttribute('data-station-index'),10); if(isNaN(idx)) return; if(document.querySelector('.station-nav')) return;
      var prev = document.createElement('button'); prev.className='nav-arrow prev-arrow'; prev.innerHTML='<span class="arrow-icon">←</span><span class="arrow-text">Anterior</span>'; prev.disabled = idx<=1; prev.addEventListener('click', function(){ if(idx>1){ var segs=location.pathname.split('/').filter(Boolean); var estIndex = segs.findIndex(s=>s.toLowerCase()==='estaciones'); var prefix = estIndex>=0?('/'+segs.slice(0,estIndex+1).join('/')+'/'):'/Estaciones/'; location.href = prefix + 'estacion'+(idx-1) + '/index.html?recorrido=1'; }});
      var next = document.createElement('button'); next.className='nav-arrow next-arrow'; next.innerHTML='<span class="arrow-text">Siguiente</span><span class="arrow-icon">→</span>'; next.disabled = idx>=5; next.addEventListener('click', function(){ if(idx<5){ var segs=location.pathname.split('/').filter(Boolean); var estIndex = segs.findIndex(s=>s.toLowerCase()==='estaciones'); var prefix = estIndex>=0?('/'+segs.slice(0,estIndex+1).join('/')+'/'):'/Estaciones/'; location.href = prefix + 'estacion'+(idx+1) + '/index.html?recorrido=1'; }});
      var wrap = document.createElement('div'); wrap.className='station-nav'; wrap.appendChild(prev); wrap.appendChild(next); document.body.appendChild(wrap);
    }catch(e){console.warn('ensureNav failed',e)}
  }
  if(document.readyState==='complete' || document.readyState==='interactive') ensureNav(); else document.addEventListener('DOMContentLoaded', ensureNav);
})();
</script>

  <script>
  document.addEventListener('DOMContentLoaded', function(){
    try{ var el=document.querySelector('[data-station-index]'); if(!el) return; var idx=parseInt(el.getAttribute('data-station-index'),10); if(window.initStopwatch) window.initStopwatch(idx);}catch(e){console.warn('fallback initStopwatch failed',e)}
  });
  </script>

</html>
