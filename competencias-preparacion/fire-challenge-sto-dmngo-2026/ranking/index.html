<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ranking — Fire Challenge 2026</title>
  <script>
    (function(){
      var repoPrefix = location.hostname.includes('github.io') ? '/bcbd-aspirantes' : '';
      var head = document.getElementsByTagName('head')[0];
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      var rel = '';
      if (repoPrefix) {
        link.href = repoPrefix + '/css/styles.css';
      } else {
        var segs = location.pathname.split('/').filter(Boolean);
        var repoName = 'bcbd-aspirantes';
        var repoIndex = segs.lastIndexOf(repoName);
        var depth = 0;
        if (repoIndex !== -1) {
          depth = segs.length - (repoIndex + 1);
          if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
        } else {
          depth = segs.length;
          if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
        }
        rel = '../'.repeat(depth);
        link.href = rel + 'css/styles.css';
      }
      head.appendChild(link);
      var layout = document.createElement('script');
      layout.defer = true;
      layout.src = repoPrefix ? repoPrefix + '/js/layout.js' : rel + 'js/layout.js';
      head.appendChild(layout);
    })();
  </script>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div id="header"></div>
  <main id="main-content">
    <section class="home-hero">
      <div class="hero-inner">
        <h1>Ranking — Fire Challenge Santo Domingo 2026</h1>
        <p class="lead">Clasificación oficial de la competencia. Aquí verás el ranking actualizado sin cambiar los datos ya registrados.</p>
      </div>
    </section>
    <section style="margin:20px 0">
      <h2>Resultados registrados</h2>
      <div id="results-panel">
        <p>Cargando resultados de la base de datos...</p>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../../js/layout.js"></script>
  <script>
    (function(){
      const GSHEET_URL = 'https://script.google.com/macros/s/AKfycbxAuEJeg7ET6gC1IFXDgASi1FsCKhlYyBx7EHB0W1TdD4rtb4e8z2hHbZGinI1xVbf24A/exec';
      
      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]; }); }
      
      function formatDate(dateStr) {
        try {
          return new Date(dateStr).toLocaleString();
        } catch(e) {
          return dateStr;
        }
      }
      
      function formatTimeForDisplay(timeValue) {
        try {
          if (typeof timeValue === 'number') {
            // Google Sheets may send a numeric value for a time field.
            // If the value is a fractional day, convert it to time.
            if (timeValue > 0 && timeValue < 1) {
              const totalSeconds = timeValue * 24 * 60 * 60;
              const minutes = Math.floor(totalSeconds / 60);
              const seconds = Math.floor(totalSeconds % 60);
              const centis = Math.round((totalSeconds - Math.floor(totalSeconds)) * 100);
              return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(centis).padStart(2, '0')}`;
            }
            // If the value looks like centiseconds stored as a number.
            const totalCentis = Math.round(timeValue);
            const mins = Math.floor(totalCentis / 6000);
            const secs = Math.floor((totalCentis % 6000) / 100);
            const cs = totalCentis % 100;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}:${String(cs).padStart(2, '0')}`;
          }
          if (typeof timeValue === 'string') {
            const trimmed = timeValue.trim();
            if (trimmed === '') return '';
            if (/^\d{1,2}:\d{2}:\d{2}$/.test(trimmed)) return trimmed;
            if (trimmed.includes('1899-12-30T')) {
              const date = new Date(trimmed);
              const hours = date.getHours();
              const minutes = date.getMinutes();
              const seconds = date.getSeconds();
              const centis = Math.floor(date.getMilliseconds() / 10);
              const totalMinutes = hours * 60 + minutes;
              return `${String(totalMinutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(centis).padStart(2, '0')}`;
            }
            const parsed = Date.parse(trimmed);
            if (!isNaN(parsed)) {
              const date = new Date(parsed);
              const hours = date.getHours();
              const minutes = date.getMinutes();
              const seconds = date.getSeconds();
              const centis = Math.floor(date.getMilliseconds() / 10);
              const totalMinutes = hours * 60 + minutes;
              return `${String(totalMinutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(centis).padStart(2, '0')}`;
            }
            return trimmed;
          }
          return String(timeValue);
        } catch(e) {
          return timeValue;
        }
      }
      
      function findColumnIndex(headers, names, fallback) {
        const normalized = headers.map(h => String(h).trim().toLowerCase());
        for (const name of names) {
          const idx = normalized.indexOf(name);
          if (idx !== -1) return idx;
        }
        return fallback;
      }
      
      function loadAndRender(){
        const panel = document.getElementById('results-panel');
        panel.innerHTML = '<p style="text-align:center; color:#666;">Cargando resultados de la base de datos...</p>';
        
        fetch(GSHEET_URL)
          .then(r => r.json())
          .then(data => {
            console.log('Data from Google Sheets:', data);
            if (!Array.isArray(data) || data.length < 2) {
              panel.innerHTML = '<p style="text-align:center; color:#999;">No hay resultados registrados aún.</p>';
              return;
            }
            const headers = Array.isArray(data[0]) ? data[0] : [];
            const nameIndex = findColumnIndex(headers, ['nombre', 'name'], 0);
            const stationIndex = findColumnIndex(headers, ['estación', 'estacion', 'station'], 1);
            const timeIndex = findColumnIndex(headers, ['tiempo', 'time', 'duration'], 2);
            const dateIndex = findColumnIndex(headers, ['fecha', 'timestamp', 'ts', 'date'], 3);
            const results = data.slice(1).filter(row => Array.isArray(row) && row.length > Math.max(nameIndex, stationIndex, timeIndex, dateIndex));
            console.log('Row structure first result:', results[0]);
            
            if (results.length === 0) {
              panel.innerHTML = '<p style="text-align:center; color:#999;">No hay resultados registrados aún.</p>';
              return;
            }
            
            let html = '<table style="width:100%; border-collapse:collapse; margin-top:12px;">';
            html += '<thead><tr style="background:#f3f4f6; border-bottom:2px solid #d1d5db;">';
            html += '<th style="padding:12px; text-align:left; font-weight:600;">Nombre</th>';
            html += '<th style="padding:12px; text-align:center; font-weight:600;">Estación</th>';
            html += '<th style="padding:12px; text-align:center; font-weight:600;">Tiempo</th>';
            html += '<th style="padding:12px; text-align:left; font-weight:600;">Fecha</th>';
            html += '</tr></thead><tbody>';
            
            results.forEach((row, idx) => {
              const bgColor = idx % 2 === 0 ? '#ffffff' : '#f9fafb';
              const name = escapeHtml(row[nameIndex] ?? '');
              const station = escapeHtml(row[stationIndex] ?? '');
              const rawTime = row[timeIndex];
              const dateValue = row[dateIndex];
              html += `<tr style="background:${bgColor}; border-bottom:1px solid #e5e7eb;">`;
              html += `<td style="padding:12px; text-align:left;">${name}</td>`;
              html += `<td style="padding:12px; text-align:center;">Estación ${station}</td>`;
              html += `<td style="padding:12px; text-align:center; font-weight:500; color:#b71c1c;">${formatTimeForDisplay(rawTime)}</td>`;
              html += `<td style="padding:12px; text-align:left; font-size:12px; color:#666;">${formatDate(dateValue)}</td>`;
              html += '</tr>';
            });
            
            html += '</tbody></table>';
            panel.innerHTML = html;
          })
          .catch(err => {
            console.error('Error fetching from Google Sheets:', err);
            panel.innerHTML = '<p style="color:#d32f2f; text-align:center;">Error al cargar resultados. ' + err.message + '</p>';
          });
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadAndRender);
      } else {
        loadAndRender();
      }
    })();
  </script>
</body>
</html>
