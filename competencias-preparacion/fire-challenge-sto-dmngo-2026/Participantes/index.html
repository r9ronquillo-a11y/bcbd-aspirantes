<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Participantes — Fire Challenge 2026</title>
  <script>
    (function(){
      var repoPrefix = location.hostname.includes('github.io') ? '/bcbd-aspirantes' : '';
      var head = document.getElementsByTagName('head')[0];
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      var rel = '';
      if (repoPrefix) {
        link.href = repoPrefix + '/css/styles.css';
      } else {
        var segs = location.pathname.split('/').filter(Boolean);
        var repoName = 'bcbd-aspirantes';
        var repoIndex = segs.lastIndexOf(repoName);
        var depth = 0;
        if (repoIndex !== -1) {
          depth = segs.length - (repoIndex + 1);
          if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
        } else {
          depth = segs.length;
          if (segs.length && segs[segs.length - 1].indexOf('.') !== -1) depth = Math.max(0, depth - 1);
        }
        rel = '../'.repeat(depth);
        link.href = rel + 'css/styles.css';
      }
      head.appendChild(link);
      var layout = document.createElement('script');
      layout.defer = true;
      layout.src = repoPrefix ? repoPrefix + '/js/layout.js' : rel + 'js/layout.js';
      head.appendChild(layout);
    })();
  </script>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div id="header"></div>
  <main id="main-content">
    <section class="home-hero">
      <div class="hero-inner">
        <h1>Participantes — Fire Challenge Santo Domingo 2026</h1>
        <p class="lead">Sección de participantes. Contenido por completar.</p>
      </div>
    </section>
    <section style="margin:20px 0">
      <h2>Resultados registrados (Global)</h2>
      <div id="results-panel">
        <p>Cargando resultados...</p>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="../../js/layout.js"></script>
  <script>
    (function(){
      const GSHEET_URL = 'https://script.google.com/macros/s/AKfycbxAuEJeg7ET6gC1IFXDgASi1FsCKhlYyBx7EHB0W1TdD4rtb4e8z2hHbZGinI1xVbf24A/exec';
      
      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]; }); }
      
      function formatDate(dateStr) {
        try {
          return new Date(dateStr).toLocaleString();
        } catch(e) {
          return dateStr;
        }
      }
      
      function formatTimeForDisplay(timeValue) {
        try {
          // Simply return as-is, Google Sheets already has it correctly formatted
          return timeValue;
        } catch(e) {
          return timeValue;
        }
      }
      
      function loadAndRender(){
        const panel = document.getElementById('results-panel');
        panel.innerHTML = '<p style="text-align:center; color:#666;">Cargando resultados globales...</p>';
        
        fetch(GSHEET_URL)
          .then(r => r.json())
          .then(data => {
            console.log('Data from Google Sheets:', data);
            // First row is headers, skip it
            const results = data.slice(1).filter(row => row.length > 0 && row[0]);
            
            if (results.length === 0) {
              panel.innerHTML = '<p style="text-align:center; color:#999;">No hay resultados registrados aún.</p>';
              return;
            }
            
            let html = '<table style="width:100%; border-collapse:collapse; margin-top:12px;">';
            html += '<thead><tr style="background:#f3f4f6; border-bottom:2px solid #d1d5db;">';
            html += '<th style="padding:12px; text-align:left; font-weight:600;">Nombre</th>';
            html += '<th style="padding:12px; text-align:center; font-weight:600;">Estación</th>';
            html += '<th style="padding:12px; text-align:center; font-weight:600;">Tiempo</th>';
            html += '<th style="padding:12px; text-align:left; font-weight:600;">Fecha</th>';
            html += '</tr></thead><tbody>';
            
            results.forEach((row, idx) => {
              const bgColor = idx % 2 === 0 ? '#ffffff' : '#f9fafb';
              html += `<tr style="background:${bgColor}; border-bottom:1px solid #e5e7eb;">`;
              html += `<td style="padding:12px; text-align:left;">${escapeHtml(row[0])}</td>`;
              html += `<td style="padding:12px; text-align:center;">Estación ${row[1]}</td>`;
              html += `<td style="padding:12px; text-align:center; font-weight:500; color:#b71c1c;">${formatTimeForDisplay(row[2])}</td>`;
              html += `<td style="padding:12px; text-align:left; font-size:12px; color:#666;">${formatDate(row[3])}</td>`;
              html += '</tr>';
            });
            
            html += '</tbody></table>';
            panel.innerHTML = html;
          })
          .catch(err => {
            console.error('Error fetching from Google Sheets:', err);
            panel.innerHTML = '<p style="color:#d32f2f; text-align:center;">Error al cargar resultados. ' + err.message + '</p>';
          });
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadAndRender);
      } else {
        loadAndRender();
      }
    })();
  </script>
</body>
</html>
